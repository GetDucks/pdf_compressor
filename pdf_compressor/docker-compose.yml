services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      ALLOWED_ORIGINS: "http://localhost:8080,http://127.0.0.1:8080,http://localhost:5500,http://127.0.0.1:5500"

  frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro